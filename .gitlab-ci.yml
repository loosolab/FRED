variables:
  GIT_SUBMODULE_STRATEGY: normal

stages:          # List of stages for jobs, and their order of execution
  - deploy
  - build-container
  - run-test

docker:
    stage: build-container
    only:
      - main
    image: docker:latest
    services:
        - name: docker:dind
          alias: docker
    before_script:
        - apk update && apk add git
        - apt-get update -qq && apt-get install -y -qq git 
        - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    script:
      - docker build --pull -t "$CI_REGISTRY_IMAGE:latest" .
      - docker push "$CI_REGISTRY_IMAGE:latest"

docker-dev:
    stage: build-container
    only:
      - unstable
    image: docker:latest
    services:
        - name: docker:dind
          alias: docker
    before_script:
        - apk update && apk add git
        - apt-get update -qq && apt-get install -y -qq git 
        - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY

    script:
      - docker build --pull -t "$CI_REGISTRY_IMAGE:dev" .
      - docker push "$CI_REGISTRY_IMAGE:dev"

test:       # Test run
  stage: run-test
  image: python:3.8-buster
  before_script:
  - pip install -r requirements.txt
  script:
    - test/test_key_yaml.py

# Build documentation
build-pages:
  image: python:3.12
  stage: deploy
  script:
    - apt-get update -qq && apt-get install -qq -y pandoc  # system install of pandoc is needed
    - pip install --upgrade pip # carsten 20251208: just to remove warning; no other effect?
    - pip install sphinx sphinx-rtd-theme
    - pip install myst_parser
    - pip install sphinx-toolbox
    - pip install nbsphinx
    - pip install nbsphinx_link
    - pip install sphinx-design # carsten 20251208: https://github.com/executablebooks/sphinx-design
    - cd docs
    - make html
  artifacts:
    paths:
      - docs/build/html/
  rules:
    - if: $CI_COMMIT_BRANCH == "main" # always for commits to main
    - if: $CI_COMMIT_BRANCH == "dev"  # always for commits to dev
    - if: $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME == "dev"
      when: never   # but not again for any merge requests coming from dev
    - when: manual  # otherwise manual
      allow_failure: True  # manual is not required

# Deploy pages for a MR - needs to be separate from deploy-pages-commit due to 
# $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != $CI_COMMIT_BRANCH
deploy-pages-MR:
  stage: deploy
  needs: 
    - job: build-pages
      artifacts: True
  inherit:
    default: false
  environment:
    name: pages/$CI_MERGE_REQUEST_SOURCE_BRANCH_NAME
    url: "https://loosolab.pages.gwdg.de/-/software/manual_nucleodetective/-/jobs/$CI_JOB_ID/artifacts/docs/build/html/index.html"
  artifacts:
    paths:
      - docs/build/html/
  script: 
    - ls -l docs/
    - echo "deploy"
  artifacts:
    paths:
      - docs/build/html/
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != "dev" && $CI_MERGE_REQUEST_SOURCE_BRANCH_NAME != "main" # dev/main are built automatically
      allow_failure: True

# Deploy pages for a commit without a MR
deploy-pages-commit:
  stage: deploy
  needs:
    - job: build-pages
      artifacts: True
  inherit:
    default: false
  environment:
    name: pages/$CI_COMMIT_BRANCH
    url: "https://loosolab.pages.gwdg.de/-/software/manual_nucleodetective/-/jobs/$CI_JOB_ID/artifacts/docs/build/html/index.html"
  script:
    - ls -l docs/
    - echo "deploy" #mv docs/build/html/ public/
  artifacts:
    paths:
      - docs/build/html/
  rules:
    - if: $CI_PIPELINE_SOURCE != "merge_request_event"
      allow_failure: True

# Deploy documentation to public pages if it was the main branch
pages:
  stage: deploy
  needs:
    - job: build-pages
      artifacts: True
  inherit:
    default: false
  script:
    - mv docs/build/html/ public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == "main" # after accepted MR to main
      allow_failure: False  # main not allowed to fail


  




